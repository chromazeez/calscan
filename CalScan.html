<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CalScan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#000;}
  body{font-family:'Inter',system-ui,sans-serif;color:#f0f0f0;}
  ::-webkit-scrollbar{width:0;}
  input::placeholder,textarea::placeholder{color:#333;}
  input:focus,textarea:focus{border-color:#d742f5!important;outline:none;box-shadow:0 0 0 2px rgba(215,66,245,0.15);}
  button{font-family:inherit;cursor:pointer;}

  @keyframes scanline{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}
  @keyframes barscan{0%{top:8%}50%{top:82%}100%{top:8%}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes cornerPulse{0%,100%{opacity:0.5}50%{opacity:1}}

  .fade-up{animation:fadeUp 0.25s ease forwards;}

  .tab-btn{
    flex:1;padding:10px 0;font-size:12px;font-weight:600;
    letter-spacing:0.05em;text-transform:uppercase;
    border:1px solid #1a1a1a;border-radius:10px;
    transition:all 0.2s;background:#0a0a0a;color:#444;
  }
  .tab-btn.active{
    background:linear-gradient(135deg,#d742f5,#a020c8);
    color:#fff;border-color:transparent;
    box-shadow:0 4px 20px rgba(215,66,245,0.4);
  }

  /* scan mode toggle */
  .mode-pill{
    display:flex;background:#0a0a0a;border:1px solid #1a1a1a;
    border-radius:12px;padding:4px;gap:4px;
  }
  .mode-btn{
    flex:1;padding:8px 10px;font-size:12px;font-weight:600;
    border:none;border-radius:9px;transition:all 0.2s;
    letter-spacing:0.03em;
  }
  .mode-btn.active{
    background:linear-gradient(135deg,#d742f5,#a020c8);
    color:#fff;box-shadow:0 2px 12px rgba(215,66,245,0.4);
  }
  .mode-btn.inactive{background:transparent;color:#444;}

  .card{
    background:#0d0d0d;border:1px solid #1a1a1a;
    border-radius:16px;overflow:hidden;
    transition:border-color 0.2s;
  }
  .card:hover{border-color:#2a2a2a;}

  .primary-btn{
    background:linear-gradient(135deg,#d742f5,#a020c8);
    color:#fff;border:none;border-radius:12px;
    font-size:14px;font-weight:700;
    box-shadow:0 4px 20px rgba(215,66,245,0.35);
    transition:all 0.2s;
  }
  .primary-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(215,66,245,0.5);}
  .primary-btn:disabled{background:#1a1a1a;color:#333;box-shadow:none;cursor:not-allowed;transform:none;}

  .ghost-btn{
    background:#0d0d0d;color:#666;border:1px solid #1a1a1a;
    border-radius:12px;font-size:13px;font-weight:500;
    transition:all 0.2s;
  }
  .ghost-btn:hover{border-color:#333;color:#aaa;}

  .input-field{
    background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;
    color:#f0f0f0;padding:11px 14px;width:100%;font-size:14px;
    font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;
  }
  .caption-field{
    background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;
    color:#f0f0f0;padding:11px 14px;width:100%;font-size:13px;
    font-family:inherit;resize:none;line-height:1.5;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  .caption-field:focus{border-color:#d742f5!important;outline:none;box-shadow:0 0 0 2px rgba(215,66,245,0.15);}

  .macro-bar-track{background:#111;border-radius:4px;height:4px;overflow:hidden;}
  .macro-bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(.4,0,.2,1);}

  /* food photo reticle */
  .scan-corner{
    position:absolute;width:28px;height:28px;
    border-width:2.5px;border-style:solid;transition:border-color 0.3s;
  }
  .scan-line{
    position:absolute;left:0;right:0;height:1.5px;
    background:linear-gradient(90deg,transparent,#d742f5,transparent);
    animation:scanline 1.4s ease-in-out infinite;
    box-shadow:0 0 16px #d742f5;
  }

  /* barcode reticle */
  .barcode-frame{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:80%;height:28%;
    border:2px solid rgba(215,66,245,0.6);
    border-radius:8px;
  }
  .barcode-rail{
    position:absolute;left:4px;right:4px;height:2px;
    background:linear-gradient(90deg,transparent,#d742f5,#ff44ff,#d742f5,transparent);
    animation:barscan 1.8s ease-in-out infinite;
    box-shadow:0 0 10px #d742f5, 0 0 20px rgba(215,66,245,0.4);
    border-radius:1px;
  }
  .barcode-corner{
    position:absolute;width:16px;height:16px;
    border-color:#d742f5;border-style:solid;
  }
  .barcode-corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
  .barcode-corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
  .barcode-corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
  .barcode-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}

  .activity-textarea{
    background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;
    color:#f0f0f0;padding:12px 14px;width:100%;font-size:14px;
    font-family:inherit;resize:none;min-height:80px;line-height:1.5;
    transition:border-color 0.2s,box-shadow 0.2s;
  }
  .activity-textarea:focus{border-color:#d742f5!important;outline:none;box-shadow:0 0 0 2px rgba(215,66,245,0.15);}

  .burned-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(215,66,245,0.12);border:1px solid rgba(215,66,245,0.25);
    border-radius:8px;padding:4px 10px;font-size:12px;
    color:#d742f5;font-weight:600;font-family:monospace;
  }
  .delete-btn{
    background:none;border:none;color:#333;font-size:16px;
    padding:4px 6px;border-radius:6px;transition:color 0.2s;line-height:1;
  }
  .delete-btn:hover{color:#ef4444;}
  .pill-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#444;font-family:monospace;}
  .pill-value{font-size:13px;font-weight:700;font-family:monospace;}

  .hint-text{font-size:11px;color:#2a2a2a;text-align:center;line-height:1.5;}

  .spinner{
    width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);
    border-top-color:#fff;border-radius:50%;
    display:inline-block;animation:spin 0.7s linear infinite;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const PROFILE = { calories:2550, protein:140, carbs:290, fat:70 };

const load = (k,d) => { try { return JSON.parse(localStorage.getItem(k)||JSON.stringify(d)); } catch { return d; } };
const save = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} };

// ── MacroPill ──────────────────────────────────────────────────────────────
function MacroPill({ label, value, goal, color }) {
  const pct = Math.min(100, Math.round((value/goal)*100));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <span className="pill-label">{label}</span>
        <span className="pill-value" style={{color}}>{value}<span style={{color:'#333',fontSize:10,fontWeight:400}}>/{goal}g</span></span>
      </div>
      <div className="macro-bar-track">
        <div className="macro-bar-fill" style={{width:`${pct}%`,background:color}} />
      </div>
    </div>
  );
}

// ── Food photo reticle ─────────────────────────────────────────────────────
function FoodReticle({ scanning }) {
  const clr = scanning ? '#d742f5' : 'rgba(215,66,245,0.4)';
  const corners = [
    {top:0,left:0,borderTopColor:clr,borderLeftColor:clr,borderRightColor:'transparent',borderBottomColor:'transparent'},
    {top:0,right:0,borderTopColor:clr,borderRightColor:clr,borderLeftColor:'transparent',borderBottomColor:'transparent'},
    {bottom:0,left:0,borderBottomColor:clr,borderLeftColor:clr,borderTopColor:'transparent',borderRightColor:'transparent'},
    {bottom:0,right:0,borderBottomColor:clr,borderRightColor:clr,borderTopColor:'transparent',borderLeftColor:'transparent'},
  ];
  return (
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
      <div style={{position:'relative',width:190,height:190}}>
        {corners.map((s,i)=>(
          <div key={i} style={{position:'absolute',width:28,height:28,borderWidth:'2.5px',borderStyle:'solid',...s}} />
        ))}
        {scanning && <div className="scan-line" />}
        {scanning && (
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{color:'#d742f5',fontSize:10,letterSpacing:'0.18em',fontFamily:'monospace',background:'rgba(0,0,0,0.75)',padding:'3px 10px',borderRadius:4}}>SCANNING</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Barcode reticle ────────────────────────────────────────────────────────
function BarcodeReticle({ scanning }) {
  return (
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none',gap:12}}>
      <div className="barcode-frame">
        <div className="barcode-corner tl" />
        <div className="barcode-corner tr" />
        <div className="barcode-corner bl" />
        <div className="barcode-corner br" />
        {scanning && <div className="barcode-rail" />}
      </div>
      <div style={{marginTop:8}}>
        <span style={{
          color: scanning ? '#d742f5' : 'rgba(215,66,245,0.5)',
          fontSize:10,letterSpacing:'0.18em',fontFamily:'monospace',
          background:'rgba(0,0,0,0.7)',padding:'3px 10px',borderRadius:4,
          transition:'color 0.3s'
        }}>
          {scanning ? 'READING LABEL' : 'ALIGN BARCODE OR LABEL'}
        </span>
      </div>
    </div>
  );
}

// ── FoodCard ───────────────────────────────────────────────────────────────
function FoodCard({ entry, onDelete }) {
  const [open, setOpen] = useState(false);
  const isBarcode = entry.source === 'barcode';
  return (
    <div className="card" style={{marginBottom:8}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',cursor:'pointer'}} onClick={()=>setOpen(v=>!v)}>
        {entry.image && <img src={entry.image} alt="" style={{width:42,height:42,borderRadius:8,objectFit:'cover',flexShrink:0}} />}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
            <div style={{fontWeight:600,fontSize:14,color:'#eee',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{entry.name}</div>
            {isBarcode && <span style={{fontSize:9,background:'rgba(215,66,245,0.15)',color:'#d742f5',border:'1px solid rgba(215,66,245,0.3)',borderRadius:4,padding:'1px 5px',flexShrink:0,fontWeight:700,letterSpacing:'0.05em'}}>LABEL</span>}
          </div>
          <div style={{fontSize:11,color:'#444'}}>{entry.serving}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0,marginRight:6}}>
          <div style={{fontFamily:'monospace',fontWeight:800,fontSize:15,color:'#d742f5'}}>{entry.calories}</div>
          <div style={{fontSize:10,color:'#333',fontFamily:'monospace'}}>kcal</div>
        </div>
        <button className="delete-btn" onClick={e=>{e.stopPropagation();onDelete();}}>×</button>
      </div>
      {open && (
        <div style={{padding:'0 14px 14px',borderTop:'1px solid #111'}}>
          <div style={{display:'flex',gap:8,paddingTop:12}}>
            {[['Protein',entry.protein,'#a78bfa'],['Carbs',entry.carbs,'#34d399'],['Fat',entry.fat,'#fb923c']].map(([l,v,c])=>(
              <div key={l} style={{flex:1,background:'#060606',borderRadius:8,padding:'8px',textAlign:'center'}}>
                <div style={{color:c,fontFamily:'monospace',fontWeight:800,fontSize:16}}>{v}g</div>
                <div style={{color:'#333',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          {entry.notes && <p style={{color:'#555',fontSize:12,lineHeight:1.6,marginTop:10}}>{entry.notes}</p>}
        </div>
      )}
    </div>
  );
}

// ── ActivityLogger ─────────────────────────────────────────────────────────
function ActivityLogger({ onBurn, onClose }) {
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const estimate = async () => {
    if (!text.trim()) return;
    setLoading(true); setError('');
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6', max_tokens:400,
          system:`Precise exercise calorie calculator. User: 17yo male, 5'5", 130 lbs, lean/athletic. Respond ONLY with valid JSON (no markdown):
{"activity":"short label","calories_burned":number,"duration_minutes":number,"notes":"brief note"}
Be realistic. 130 lbs is light — burns are lower than average adult estimates.`,
          messages:[{role:'user',content:`Estimate calories burned: ${text}`}]
        })
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const raw = data.content.map(b=>b.text||'').join('');
      onBurn(JSON.parse(raw.replace(/```json|```/g,'').trim()));
      onClose();
    } catch(e) { setError('Try being more specific, e.g. "45 min weightlifting" or "20 min run moderate pace".'); }
    finally { setLoading(false); }
  };
  return (
    <div className="card fade-up" style={{padding:18,marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div>
          <div style={{fontWeight:700,fontSize:15,color:'#eee'}}>Log Activity</div>
          <div style={{fontSize:11,color:'#444',marginTop:2}}>Describe what you did — AI estimates the burn</div>
        </div>
        <button className="delete-btn" style={{fontSize:20}} onClick={onClose}>×</button>
      </div>
      <textarea className="activity-textarea"
        placeholder={'e.g. "1 hour weightlifting, chest and back"\n"30 min run moderate pace"\n"45 min basketball pickup game"'}
        value={text} onChange={e=>setText(e.target.value)} />
      {error && <div style={{color:'#f87171',fontSize:12,marginTop:8,lineHeight:1.5}}>{error}</div>}
      <div style={{display:'flex',gap:10,marginTop:12}}>
        <button className="ghost-btn" onClick={onClose} style={{flex:1,padding:'11px'}}>Cancel</button>
        <button className="primary-btn" onClick={estimate} disabled={loading||!text.trim()} style={{flex:2,padding:'11px'}}>
          {loading ? <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><span className="spinner"/>Calculating…</span> : '⚡ Estimate Burn'}
        </button>
      </div>
    </div>
  );
}

// ── ManualEntry ────────────────────────────────────────────────────────────
function ManualEntry({ onAdd, onClose }) {
  const [f, setF] = useState({name:'',calories:'',protein:'',carbs:'',fat:'',serving:'1 serving'});
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  const lbl = {color:'#444',fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',display:'block',marginBottom:6,fontFamily:'monospace'};
  return (
    <div className="card fade-up" style={{padding:18,marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:15,color:'#eee'}}>Add manually</div>
        <button className="delete-btn" style={{fontSize:20}} onClick={onClose}>×</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div><label style={lbl}>Food name *</label><input className="input-field" value={f.name} onChange={e=>s('name',e.target.value)} placeholder="e.g. Grilled chicken breast"/></div>
        <div><label style={lbl}>Serving</label><input className="input-field" value={f.serving} onChange={e=>s('serving',e.target.value)} placeholder="e.g. 200g, 1 cup"/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[['Calories *','calories','kcal'],['Protein (g)','protein','g'],['Carbs (g)','carbs','g'],['Fat (g)','fat','g']].map(([l,k,ph])=>(
            <div key={k}><label style={lbl}>{l}</label><input className="input-field" type="number" value={f[k]} onChange={e=>s(k,e.target.value)} placeholder={ph}/></div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginTop:4}}>
          <button className="ghost-btn" onClick={onClose} style={{flex:1,padding:'11px'}}>Cancel</button>
          <button className="primary-btn" onClick={()=>{
            if(!f.name||!f.calories)return;
            onAdd({name:f.name,calories:parseInt(f.calories)||0,protein:parseInt(f.protein)||0,carbs:parseInt(f.carbs)||0,fat:parseInt(f.fat)||0,serving:f.serving,notes:''});
            onClose();
          }} style={{flex:2,padding:'11px'}}>Add Food</button>
        </div>
      </div>
    </div>
  );
}

// ── ResultCard ─────────────────────────────────────────────────────────────
function ResultCard({ result, onAdd, onRetake }) {
  return (
    <div className="card fade-up" style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
        <div style={{flex:1,marginRight:12}}>
          <h3 style={{fontSize:16,fontWeight:700,color:'#eee',marginBottom:3}}>{result.name}</h3>
          <span style={{color:'#444',fontSize:12}}>{result.serving}</span>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontFamily:'monospace',fontWeight:900,fontSize:30,color:'#d742f5',lineHeight:1}}>{result.calories}</div>
          <div style={{color:'#333',fontSize:10,fontFamily:'monospace'}}>kcal</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['Protein',result.protein,'#a78bfa'],['Carbs',result.carbs,'#34d399'],['Fat',result.fat,'#fb923c']].map(([l,v,c])=>(
          <div key={l} style={{flex:1,background:'#060606',borderRadius:10,padding:'10px',textAlign:'center'}}>
            <div style={{color:c,fontFamily:'monospace',fontWeight:800,fontSize:18}}>{v}g</div>
            <div style={{color:'#333',fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom: result.notes ? 10 : 14}}>
        <span style={{fontSize:10,color:'#333',fontFamily:'monospace',textTransform:'uppercase',letterSpacing:'0.08em'}}>Confidence</span>
        <span style={{fontSize:11,fontFamily:'monospace',fontWeight:700,
          color:result.confidence==='high'?'#4ade80':result.confidence==='medium'?'#fb923c':'#f87171'}}>
          {(result.confidence||'').toUpperCase()}
        </span>
      </div>
      {result.notes && <p style={{color:'#444',fontSize:12,lineHeight:1.6,marginBottom:14}}>{result.notes}</p>}
      <div style={{display:'flex',gap:10}}>
        <button className="ghost-btn" onClick={onRetake} style={{flex:1,padding:'11px'}}>Retake</button>
        <button className="primary-btn" onClick={onAdd} style={{flex:2,padding:'11px',fontSize:14}}>✓ Add to Log</button>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [entries,      setEntries]      = useState(()=>load('cs_entries',[]));
  const [burns,        setBurns]        = useState(()=>load('cs_burns',[]));
  const [tab,          setTab]          = useState('log');
  const [scanMode,     setScanMode]     = useState('food'); // 'food' | 'barcode'
  const [scanning,     setScanning]     = useState(false);
  const [result,       setResult]       = useState(null);
  const [error,        setError]        = useState('');
  const [stream,       setStream]       = useState(null);
  const [camReady,     setCamReady]     = useState(false);
  const [captured,     setCaptured]     = useState(null);
  const [caption,      setCaption]      = useState('');
  const [showCaption,  setShowCaption]  = useState(false);
  const [showManual,   setShowManual]   = useState(false);
  const [showActivity, setShowActivity] = useState(false);

  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const fileRef   = useRef(null);

  useEffect(()=>save('cs_entries',entries),[entries]);
  useEffect(()=>save('cs_burns',burns),[burns]);

  const today = new Date().toDateString();
  const todayEntries = entries.filter(e=>e.date===today);
  const todayBurns   = burns.filter(b=>b.date===today);
  const eaten = todayEntries.reduce((a,e)=>({
    calories:a.calories+(e.calories||0),protein:a.protein+(e.protein||0),
    carbs:a.carbs+(e.carbs||0),fat:a.fat+(e.fat||0)
  }),{calories:0,protein:0,carbs:0,fat:0});
  const totalBurned = todayBurns.reduce((a,b)=>a+(b.calories_burned||0),0);
  const netCalories = eaten.calories - totalBurned;
  const remaining   = PROFILE.calories - netCalories;

  const netPct = Math.min(100,Math.max(0,Math.round((netCalories/PROFILE.calories)*100)));
  const R=52, circ=2*Math.PI*R, dash=circ*(1-netPct/100);
  const ringColor = netCalories > PROFILE.calories ? '#f87171' : '#d742f5';

  // ── Camera ──────────────────────────────────────────────────────────────
  const startCam = useCallback(async()=>{
    setError('');
    try {
      const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
      setStream(s);
      if(videoRef.current){
        videoRef.current.srcObject=s;
        videoRef.current.onloadedmetadata=()=>{videoRef.current.play();setCamReady(true);};
      }
    } catch { setError('Camera denied — use 📁 Upload instead.'); }
  },[]);

  const stopCam = useCallback(()=>{
    if(stream){stream.getTracks().forEach(t=>t.stop());setStream(null);}
    setCamReady(false);
  },[stream]);

  useEffect(()=>{
    if(tab==='camera') startCam(); else stopCam();
    return stopCam;
  },[tab]);

  const captureFrame = useCallback(()=>{
    const v=videoRef.current,c=canvasRef.current;
    if(!v||!c)return null;
    c.width=v.videoWidth||1280; c.height=v.videoHeight||720;
    c.getContext('2d').drawImage(v,0,0);
    return c.toDataURL('image/jpeg',0.92);
  },[]);

  // ── AI Analysis ─────────────────────────────────────────────────────────
  const analyzeImage = useCallback(async(b64, mode, userCaption)=>{
    setScanning(true); setResult(null); setError('');
    try {
      const imgData = b64.replace(/^data:image\/\w+;base64,/,'');

      const systemPrompt = mode === 'barcode'
        ? `You are a nutrition label reader. The image shows a nutrition facts label, barcode, or product packaging. Extract the exact nutritional information shown. If you see a nutrition facts panel, use those exact numbers. If you only see a barcode or partial label, use the product name/brand to estimate. Respond ONLY with valid JSON (no markdown):
{"name":"exact product name and brand","serving":"serving size as shown on label","calories":number,"protein":number,"carbs":number,"fat":number,"confidence":"high|medium|low","notes":"note if reading directly from label vs estimated, and serving size used"}`
        : `You are a precise nutrition AI. Analyze the food image${userCaption ? ' and the user\'s description' : ''}. Respond ONLY with valid JSON (no markdown):
{"name":"specific food name","serving":"estimated portion size","calories":number,"protein":number,"carbs":number,"fat":number,"confidence":"high|medium|low","notes":"brief accuracy note about estimation"}
Be accurate. If multiple foods visible, combine for the full meal.${userCaption ? ' Prioritize the user\'s description to improve accuracy.' : ''}`;

      const userContent = [
        {type:'image', source:{type:'base64',media_type:'image/jpeg',data:imgData}},
        {type:'text',  text: mode==='barcode'
          ? 'Read the nutrition information from this label/packaging and return as JSON.'
          : `Analyze this food${userCaption ? ` — user says: "${userCaption}"` : ''} and return nutritional info as JSON.`
        }
      ];

      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:systemPrompt,messages:[{role:'user',content:userContent}]})
      });
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const txt  = data.content.map(b=>b.text||'').join('');
      setResult({...JSON.parse(txt.replace(/```json|```/g,'').trim()), source: mode});
    } catch(e){
      setError('Analysis failed: '+(e.message.includes('401')?'Open this file from claude.ai or a browser with camera access':e.message));
    } finally { setScanning(false); }
  },[]);

  const handleCapture = useCallback(()=>{
    const img = captureFrame(); if(!img) return;
    setCaptured(img);
    if(scanMode==='food' && showCaption && caption.trim()){
      analyzeImage(img, 'food', caption.trim());
    } else {
      analyzeImage(img, scanMode, '');
    }
  },[captureFrame, scanMode, showCaption, caption, analyzeImage]);

  const handleFile = useCallback(e=>{
    const f=e.target.files?.[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      const src=ev.target.result;
      setCaptured(src); setTab('camera');
      analyzeImage(src, scanMode, showCaption&&caption.trim()?caption.trim():'');
    };
    r.readAsDataURL(f); e.target.value='';
  },[scanMode, showCaption, caption, analyzeImage]);

  const addFood = useCallback(()=>{
    if(!result) return;
    setEntries(p=>[...p,{...result,id:Date.now(),date:today,image:captured}]);
    setResult(null); setCaptured(null); setCaption(''); setShowCaption(false); setTab('log');
  },[result,captured,today]);

  const resetScan = ()=>{ setCaptured(null); setResult(null); setError(''); };

  const switchMode = (mode) => {
    setScanMode(mode); resetScan(); setCaption(''); setShowCaption(false);
  };

  return (
    <div style={{background:'#000',minHeight:'100vh',display:'flex',flexDirection:'column',maxWidth:430,margin:'0 auto'}}>

      {/* ── HEADER ── */}
      <div style={{padding:'22px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:10,color:'#2a2a2a',letterSpacing:'0.14em',textTransform:'uppercase',fontFamily:'monospace',marginBottom:3}}>
            {new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}
          </div>
          <h1 style={{fontSize:26,fontWeight:900,letterSpacing:'-0.04em',lineHeight:1}}>
            Cal<span style={{color:'#d742f5'}}>Scan</span>
          </h1>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="ghost-btn" onClick={()=>{setShowActivity(true);setShowManual(false);}} style={{padding:'7px 12px',fontSize:12}}>⚡ Activity</button>
          <button className="ghost-btn" onClick={()=>{setShowManual(true);setShowActivity(false);}} style={{padding:'7px 12px',fontSize:12}}>+ Food</button>
        </div>
      </div>

      {/* ── RING SUMMARY ── */}
      <div style={{padding:'18px 20px 14px',display:'flex',alignItems:'center',gap:20}}>
        <div style={{position:'relative',flexShrink:0}}>
          <svg width={124} height={124}>
            <circle cx={62} cy={62} r={R} fill="none" stroke="#0d0d0d" strokeWidth={9}/>
            <circle cx={62} cy={62} r={R} fill="none" stroke={ringColor} strokeWidth={9}
              strokeDasharray={circ} strokeDashoffset={dash}
              strokeLinecap="round" transform="rotate(-90 62 62)"
              style={{transition:'stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)',filter:`drop-shadow(0 0 6px ${ringColor})`}}/>
            <text x={62} y={56} textAnchor="middle" fill="#eee" fontSize={20} fontWeight={900} fontFamily="monospace">{netCalories}</text>
            <text x={62} y={70} textAnchor="middle" fill="#333" fontSize={9} fontFamily="monospace">NET KCAL</text>
            <text x={62} y={84} textAnchor="middle" fontSize={9} fontWeight={700} fontFamily="monospace"
              fill={remaining>=0?'#4ade80':'#f87171'}>
              {remaining>=0?`${remaining} left`:`${Math.abs(remaining)} over`}
            </text>
          </svg>
          {totalBurned>0&&(
            <div style={{position:'absolute',bottom:-6,left:'50%',transform:'translateX(-50%)',whiteSpace:'nowrap'}}>
              <span className="burned-badge">🔥 −{totalBurned}</span>
            </div>
          )}
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:12}}>
          <MacroPill label="Protein" value={eaten.protein} goal={PROFILE.protein} color="#a78bfa"/>
          <MacroPill label="Carbs"   value={eaten.carbs}   goal={PROFILE.carbs}   color="#34d399"/>
          <MacroPill label="Fat"     value={eaten.fat}     goal={PROFILE.fat}     color="#fb923c"/>
        </div>
      </div>

      {/* eaten / target / burned */}
      <div style={{display:'flex',gap:1,margin:'0 20px 16px',background:'#0a0a0a',borderRadius:12,overflow:'hidden',border:'1px solid #111'}}>
        {[['Eaten',eaten.calories,'#eee'],['Target',PROFILE.calories,'#d742f5'],['Burned',totalBurned,'#4ade80']].map(([l,v,c])=>(
          <div key={l} style={{flex:1,padding:'10px 0',textAlign:'center'}}>
            <div style={{fontFamily:'monospace',fontWeight:800,fontSize:16,color:c}}>{v}</div>
            <div style={{fontSize:10,color:'#333',letterSpacing:'0.08em',textTransform:'uppercase',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      {/* ── TABS ── */}
      <div style={{display:'flex',gap:6,padding:'0 20px',marginBottom:16}}>
        {[['log','📋 Today'],['camera','📷 Scan']].map(([k,lbl])=>(
          <button key={k} className={`tab-btn ${tab===k?'active':''}`}
            onClick={()=>{setTab(k);resetScan();setError('');}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* ── CONTENT ── */}
      <div style={{flex:1,padding:'0 20px 90px',overflowY:'auto'}}>

        {showActivity && <ActivityLogger onBurn={b=>{setBurns(p=>[...p,{...b,id:Date.now(),date:today}]);}} onClose={()=>setShowActivity(false)}/>}
        {showManual   && <ManualEntry onAdd={e=>{setEntries(p=>[...p,{...e,id:Date.now(),date:today}]);setShowManual(false);}} onClose={()=>setShowManual(false)}/>}

        {/* ══ SCAN TAB ══ */}
        {tab==='camera' && (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>

            {/* MODE SWITCHER — only show when not captured */}
            {!captured && (
              <div className="mode-pill">
                <button className={`mode-btn ${scanMode==='food'?'active':'inactive'}`} onClick={()=>switchMode('food')}>
                  🍽 Food Photo
                </button>
                <button className={`mode-btn ${scanMode==='barcode'?'active':'inactive'}`} onClick={()=>switchMode('barcode')}>
                  📦 Label / Barcode
                </button>
              </div>
            )}

            {/* MODE HINT */}
            {!captured && (
              <p className="hint-text">
                {scanMode==='food'
                  ? 'Point at your meal and capture — AI identifies and estimates nutrition'
                  : 'Point at the nutrition label or barcode on the back of a product'
                }
              </p>
            )}

            {!captured ? (
              <>
                {/* VIEWFINDER */}
                <div style={{position:'relative',borderRadius:16,overflow:'hidden',background:'#080808',
                  aspectRatio: scanMode==='barcode' ? '3/2' : '4/3',
                  border:'1px solid #111'}}>
                  <video ref={videoRef} autoPlay playsInline muted
                    style={{width:'100%',height:'100%',objectFit:'cover',display:camReady?'block':'none'}}/>
                  {!camReady&&!error&&(
                    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
                      <div style={{width:22,height:22,border:'2px solid #d742f5',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>
                      <span style={{color:'#2a2a2a',fontSize:12,fontFamily:'monospace'}}>STARTING CAMERA</span>
                    </div>
                  )}
                  {error&&(
                    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
                      <span style={{color:'#f87171',fontSize:13,textAlign:'center',lineHeight:1.6}}>📵 {error}</span>
                    </div>
                  )}
                  {scanMode==='food'
                    ? <FoodReticle scanning={false}/>
                    : <BarcodeReticle scanning={false}/>
                  }
                  <canvas ref={canvasRef} style={{display:'none'}}/>
                </div>

                {/* CAPTION TOGGLE — food mode only */}
                {scanMode==='food' && (
                  <div>
                    <button
                      onClick={()=>setShowCaption(v=>!v)}
                      style={{
                        background:'none',border:'none',color:showCaption?'#d742f5':'#444',
                        fontSize:12,fontWeight:600,padding:'2px 0',letterSpacing:'0.03em',
                        display:'flex',alignItems:'center',gap:6,transition:'color 0.2s'
                      }}>
                      <span style={{
                        display:'inline-flex',alignItems:'center',justifyContent:'center',
                        width:16,height:16,border:`1.5px solid ${showCaption?'#d742f5':'#333'}`,
                        borderRadius:4,fontSize:10,color:showCaption?'#d742f5':'transparent',
                        transition:'all 0.2s', background:showCaption?'rgba(215,66,245,0.1)':'transparent'
                      }}>✓</span>
                      Add a note to help AI (optional)
                    </button>
                    {showCaption && (
                      <div className="fade-up" style={{marginTop:8}}>
                        <textarea className="caption-field" rows={2}
                          placeholder='e.g. "2 chicken thighs with rice and broccoli" or "this is about 300g"'
                          value={caption} onChange={e=>setCaption(e.target.value)}/>
                      </div>
                    )}
                  </div>
                )}

                <div style={{display:'flex',gap:10}}>
                  <button className="primary-btn" onClick={handleCapture} disabled={!camReady} style={{flex:2,padding:'14px',fontSize:14}}>
                    {scanMode==='barcode' ? '📦 Scan Label' : '📸 Capture & Analyze'}
                  </button>
                  <button className="ghost-btn" onClick={()=>fileRef.current?.click()} style={{flex:1,padding:'14px'}}>📁 Upload</button>
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
              </>
            ) : (
              <>
                {/* CAPTURED VIEW */}
                <div style={{position:'relative',borderRadius:16,overflow:'hidden',background:'#080808',
                  aspectRatio: scanMode==='barcode'?'3/2':'4/3',border:'1px solid #111'}}>
                  <img src={captured} alt="scan" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  {scanMode==='food'
                    ? <FoodReticle scanning={scanning}/>
                    : <BarcodeReticle scanning={scanning}/>
                  }
                </div>

                {scanning && (
                  <div style={{background:'#0a0a0a',border:'1px solid #1a1a1a',borderRadius:12,padding:14,display:'flex',gap:12,alignItems:'center'}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:'#d742f5',animation:'pulse 0.9s infinite',flexShrink:0}}/>
                    <span style={{color:'#d742f5',fontSize:12,fontFamily:'monospace',letterSpacing:'0.05em'}}>
                      {scanMode==='barcode' ? 'READING NUTRITION LABEL…' : 'AI ANALYZING FOOD…'}
                    </span>
                  </div>
                )}
                {error && <div style={{color:'#f87171',fontSize:13,background:'#110808',border:'1px solid #2d1111',borderRadius:10,padding:'10px 14px'}}>{error}</div>}
                {result && !scanning && <ResultCard result={result} onAdd={addFood} onRetake={resetScan}/>}
                {!scanning && !result && <button className="ghost-btn" onClick={resetScan} style={{padding:'11px',width:'100%'}}>← Try again</button>}
              </>
            )}
          </div>
        )}

        {/* ══ LOG TAB ══ */}
        {tab==='log' && (
          <div>
            {todayBurns.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:'#2a2a2a',fontFamily:'monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Activity Burns</div>
                {todayBurns.map(b=>(
                  <div key={b.id} className="card" style={{marginBottom:6,padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'#ddd',marginBottom:2}}>{b.activity}</div>
                      <div style={{fontSize:11,color:'#444'}}>{b.duration_minutes} min</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontFamily:'monospace',fontWeight:800,fontSize:14,color:'#4ade80'}}>−{b.calories_burned}</span>
                      <button className="delete-btn" onClick={()=>setBurns(p=>p.filter(x=>x.id!==b.id))}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {todayEntries.length===0&&todayBurns.length===0 ? (
              <div style={{textAlign:'center',padding:'56px 20px',color:'#222'}}>
                <div style={{fontSize:48,marginBottom:14}}>🍽️</div>
                <div style={{fontSize:15,color:'#444',marginBottom:6}}>Nothing logged yet</div>
                <div style={{fontSize:12,color:'#2a2a2a'}}>Tap <span style={{color:'#d742f5'}}>📷 Scan</span> or <span style={{color:'#d742f5'}}>+ Food</span> to start</div>
              </div>
            ) : (
              <>
                {todayEntries.length>0&&(
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:'#2a2a2a',fontFamily:'monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Food Log</div>
                    {todayEntries.map(e=>(
                      <div key={e.id} className="fade-up">
                        <FoodCard entry={e} onDelete={()=>setEntries(p=>p.filter(x=>x.id!==e.id))}/>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{background:'#0a0a0a',border:'1px solid #111',borderRadius:12,padding:'14px',marginTop:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <span style={{fontSize:10,color:'#333',fontFamily:'monospace',textTransform:'uppercase',letterSpacing:'0.1em'}}>Net Today</span>
                    <span style={{fontFamily:'monospace',fontWeight:900,fontSize:18,color:remaining>=0?'#d742f5':'#f87171'}}>
                      {netCalories} <span style={{fontSize:11,fontWeight:400,color:'#333'}}>/ {PROFILE.calories} kcal</span>
                    </span>
                  </div>
                  <div style={{background:'#111',borderRadius:6,height:6,overflow:'hidden'}}>
                    <div style={{
                      width:`${Math.min(100,(netCalories/PROFILE.calories)*100)}%`,
                      height:'100%',borderRadius:6,
                      background:netCalories>PROFILE.calories?'#f87171':'linear-gradient(90deg,#d742f5,#a020c8)',
                      transition:'width 0.6s ease',
                      boxShadow:netCalories<=PROFILE.calories?'0 0 8px rgba(215,66,245,0.4)':'none'
                    }}/>
                  </div>
                </div>
              </>
            )}
          </div>
        )}
      </div>

      <div style={{textAlign:'center',padding:'10px 20px 16px',borderTop:'1px solid #0d0d0d'}}>
        <span style={{fontSize:10,color:'#111',fontFamily:'monospace',letterSpacing:'0.05em'}}>CALSCAN · CLAUDE AI · TARGET 2,550 KCAL</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
